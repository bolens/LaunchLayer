# Weekly hub dependency audit (kept off the PR critical path).
name: Hub audit

on:
  schedule:
    # Mondays 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: hub-audit
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: hub/package.json

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: hub/pnpm-lock.yaml

      - name: Install hub dependencies
        run: bash scripts/hub-pm.sh install --frozen-lockfile

      - name: Audit hub dependencies
        run: bash scripts/hub-pm.sh audit --audit-level=high
