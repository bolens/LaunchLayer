# Reusable hub suite — called from ci.yml when hub paths change.
name: CI / Hub

on:
  workflow_call:

permissions:
  contents: read

jobs:
  hub:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # version omitted — reads packageManager from package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: hub/pnpm-lock.yaml

      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit hub dependencies
        run: pnpm audit --audit-level=high

      - name: Typecheck hub Convex functions
        run: pnpm exec tsc -p convex/tsconfig.json

      - name: Test hub
        run: pnpm test
