name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck bats python3

      - name: Shellcheck
        run: make shellcheck

      - name: Prepare vm.max_map_count for doctor tests
        run: sudo sysctl -w vm.max_map_count=2147483642

      - name: Bats
        run: make test

  hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Install hub dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit hub dependencies
        run: pnpm audit --audit-level=high

      - name: Typecheck hub Convex functions
        run: pnpm exec tsc -p convex/tsconfig.json
