name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      shell: ${{ steps.filter.outputs.shell }}
      hub: ${{ steps.filter.outputs.hub }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            shell:
              - 'lib/**'
              - 'launchlayer'
              - 'launch.d/**'
              - 'scripts/**'
              - 'share/**'
              - 'test/**'
              - 'Makefile'
              - '.shellcheckrc'
              - 'README.md'
              - 'docs/cli.md'
              - 'docs/tui.md'
              - '.github/workflows/ci-shell.yml'
              - '.github/workflows/ci.yml'
            hub:
              - 'hub/**'
              - 'package.json'
              - '.node-version'
              - 'scripts/hub-pm.sh'
              - 'docs/architecture.md'
              - '.github/workflows/ci-hub.yml'
              - '.github/workflows/ci.yml'
              - '.github/workflows/hub-audit.yml'
            workflows:
              - '.github/workflows/**'

  actionlint:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download actionlint
        env:
          ACTIONLINT_VERSION: "1.7.12"
        run: |
          set -euo pipefail
          bash <(curl --proto '=https' --tlsv1.2 -fsSL \
            "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") \
            "${ACTIONLINT_VERSION}"

      - name: Run actionlint
        run: ./actionlint -color

  shell:
    needs: changes
    if: needs.changes.outputs.shell == 'true'
    uses: ./.github/workflows/ci-shell.yml

  hub:
    needs: changes
    if: needs.changes.outputs.hub == 'true'
    uses: ./.github/workflows/ci-hub.yml

  # Always runs. Require this job name ("ci") in branch protection.
  # Succeeds when path-filtered suites are skipped; fails if a needed suite failed.
  ci:
    needs: [changes, actionlint, shell, hub]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Aggregate path-filtered results
        run: |
          set -euo pipefail
          shell_needed='${{ needs.changes.outputs.shell }}'
          hub_needed='${{ needs.changes.outputs.hub }}'
          workflows_needed='${{ needs.changes.outputs.workflows }}'
          shell_result='${{ needs.shell.result }}'
          hub_result='${{ needs.hub.result }}'
          changes_result='${{ needs.changes.result }}'
          actionlint_result='${{ needs.actionlint.result }}'

          echo "changes=$changes_result actionlint_needed=$workflows_needed actionlint=$actionlint_result shell_needed=$shell_needed shell=$shell_result hub_needed=$hub_needed hub=$hub_result"

          if [[ "$changes_result" != "success" ]]; then
            echo "changes job did not succeed"
            exit 1
          fi

          if [[ "$workflows_needed" == "true" && "$actionlint_result" != "success" ]]; then
            echo "actionlint required but result was: $actionlint_result"
            exit 1
          fi

          if [[ "$shell_needed" == "true" && "$shell_result" != "success" ]]; then
            echo "shell suite required but result was: $shell_result"
            exit 1
          fi

          if [[ "$hub_needed" == "true" && "$hub_result" != "success" ]]; then
            echo "hub suite required but result was: $hub_result"
            exit 1
          fi

          echo "CI gate green"
