version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /hub
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      hub-production:
        dependency-type: production
      hub-development:
        dependency-type: development
    # Keep eslint/typescript on current majors — majors break hub-lint
    # (typescript-eslint + @convex-dev/eslint-plugin need coordinated upgrades).
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@convex-dev/eslint-plugin"
        update-types: ["version-update:semver-major"]
