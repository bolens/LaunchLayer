# DEPRECATED: use share/launchlayer/sysctl/elasticsearch.conf instead.
#
# elasticsearch package installs /usr/lib/sysctl.d/elasticsearch.conf which loads
# AFTER /etc/sysctl.d/99-proton-vm.conf and resets vm.max_map_count to 262144.
#
# Fix (same filename in /etc wins over /usr/lib):
#   launchlayer --sysctl install
#   sudo rm -f /etc/sysctl.d/99-proton-vm.conf
#   sysctl -n vm.max_map_count   # should print 2147483642
